name: hello

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo "Triggered by $GITHUB_EVENT_NAME on $GITHUB_REF"
