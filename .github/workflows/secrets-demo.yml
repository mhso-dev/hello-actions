name: secrets-demo

on:
  workflow_dispatch:

jobs:
  show-masking:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EC2_HOST: ${{ vars.EC2_HOST }}
    steps:
      - name: Print masked secret
        run: |
          echo "key configured: $([[ -n \"$OPENAI_API_KEY\" ]] && echo yes || echo no)"
          echo "host:           $EC2_HOST"

      - name: Try to leak a secret (should be masked)
        run: echo "leak attempt -> $OPENAI_API_KEY"
